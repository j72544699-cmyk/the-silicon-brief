<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Silicon Brief — All Issues</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0A0A0A;
    color: #E8E4DC;
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
  }

  .page {
    max-width: 740px;
    margin: 0 auto;
    border-left: 0.5px solid #1E1E1E;
    border-right: 0.5px solid #1E1E1E;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    border-bottom: 1px solid #C8A94A;
    padding: 52px 48px 40px;
    text-align: center;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
  }

  .header-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #4A4540;
    text-transform: uppercase;
    line-height: 1.8;
    text-align: left;
  }

  .header-meta.right { text-align: right; }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: #E8E4DC;
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .wordmark em { color: #C8A94A; font-style: normal; }

  .wordmark-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: #4A4540;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .tagline {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    font-style: italic;
    color: #6B6460;
    font-weight: 300;
  }

  /* GOLD RULE */
  .gold-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 24px 48px;
    border-bottom: 0.5px solid #1E1E1E;
  }

  .gold-rule::before, .gold-rule::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: #C8A94A;
    opacity: 0.4;
  }

  .gold-rule span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #C8A94A;
    text-transform: uppercase;
  }

  /* ISSUES LIST */
  .issues-section {
    padding: 48px 48px 64px;
  }

  .issues-section h2 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: #4A4540;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .issue-card {
    border: 0.5px solid #1E1E1E;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .issue-card:hover {
    border-color: #C8A94A;
  }

  .issue-card a {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 28px 32px;
    text-decoration: none;
    color: inherit;
  }

  .issue-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #C8A94A;
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 72px;
  }

  .issue-divider {
    width: 0.5px;
    height: 40px;
    background: #2A2520;
    flex-shrink: 0;
  }

  .issue-info { flex: 1; }

  .issue-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #E8E4DC;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .issue-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #4A4540;
    text-transform: uppercase;
  }

  .issue-arrow {
    font-size: 14px;
    color: #C8A94A;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
  }

  .issue-card:hover .issue-arrow {
    opacity: 1;
    transform: translateX(4px);
  }

  /* FOOTER */
  .footer {
    border-top: 1px solid #C8A94A;
    padding: 32px 48px;
    text-align: center;
  }

  .footer p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #2A2520;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-top">
      <div class="header-meta">
        Intelligence<br>For the<br>AI Era
      </div>
      <div>
        <div class="wordmark">The <em>Silicon</em> Brief</div>
        <div class="wordmark-sub">Signal over noise</div>
      </div>
      <div class="header-meta right">
        All<br>Issues<br>Archive
      </div>
    </div>
    <div class="tagline">Curated dispatches from the frontier of artificial intelligence</div>
  </header>

  <div class="gold-rule"><span>Archive</span></div>

  <section class="issues-section">
    <h2>All Issues</h2>

    <div class="issue-card">
      <a href="silicon-brief-issue-001.html">
        <div class="issue-number">Issue 001</div>
        <div class="issue-divider"></div>
        <div class="issue-info">
          <div class="issue-title">The Silicon Brief — Issue 001</div>
          <div class="issue-date">Inaugural Edition</div>
        </div>
        <div class="issue-arrow">→</div>
      </a>
    </div>

  </section>

  <footer class="footer">
    <p>The Silicon Brief &nbsp;·&nbsp; Signal over noise &nbsp;·&nbsp; All rights reserved</p>
  </footer>

</div>
</body>
</html>
